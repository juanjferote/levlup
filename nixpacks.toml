[phases.setup]
nixPkgs = ["php83", "php83Extensions.bcmath", "php83Extensions.pdo", "php83Extensions.pdo_mysql", "php83Extensions.mbstring", "php83Extensions.tokenizer", "php83Extensions.xml", "php83Extensions.ctype", "php83Extensions.fileinfo", "composer"]

[phases.install]
cmds = ["composer install --optimize-autoloader --no-dev --no-interaction --no-scripts --ignore-platform-req=ext-bcmath"]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"